<style>
  html {
    /* 
      Fluid Typography:
      This scales the base font size smoothly with the viewport width.
      - Minimum size is 1rem (typically 16px), ensuring readability on small screens.
      - Maximum size is 1.5rem (typically 24px), preventing text from getting too large on wide screens.
      - The preferred size (0.5rem + 1.25vw) grows with the screen width (vw).
      Because Tailwind uses `rem` units extensively, this single change makes the entire UI scale proportionally.
    */
    font-size: clamp(1rem, 0.5rem + 1.25vw, 1.5rem);
  }
</style>
